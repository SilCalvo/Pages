        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-image: url('images/backgroung_index.png');
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-position: center;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background-color: rgba(0, 0, 0, 0.7);
            padding: 10px;
            text-align: center;
            position: relative;
        }
        header img {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 100px; 
            height: auto;
        }
        .content {
            padding: 20px;
            max-width: calc(70% - 50px);
            background-color: rgba(0, 0, 0, 0.5);
            margin: auto;
            border-radius: 8px;
            margin-top: 40px;
            display: inline-block; 
        }
        a {
            color: white;
            text-decoration: none;
            display: block;
            padding: 20px;
            width: 100%;
            box-sizing: border-box;
        }
        .square-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
        }
        .square {
            width: 80%;
            max-width: 600px;
            background-color: rgba(255, 255, 255, 0.3);
            border: 2px solid white;
            border-radius: 8px;
            color: blue;
            text-align: center;
            cursor: pointer;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }
        .square:hover {
            transform: translateY(-10px);
        }
        .square h2 {
            font-size: 1.5em;
            margin: 0;
        }
        .square p {
            font-size: 1.1em;
            margin-top: 10px;
        }
    </style>
</head>
